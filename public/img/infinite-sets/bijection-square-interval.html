<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <title>drawing with canvas</title>
    <style>
        canvas {
            border: 1pt solid black;
        }

        div {
            padding: 10px;
        }
    </style>

</head>

<body>


    <div>

        <p><span id="canvasDimensions"></span></p>
    </div>

    <div>
        <canvas>
    </div>

</body>

<script>
    const windowDimensionsSpan = document.querySelector("#window-dimension-span");
    const canvas = document.querySelector("canvas");
    const context = canvas.getContext("2d");
    let cw, ch; // canvas width and height;

    function windowResize() {
        cw = canvas.parentElement.clientWidth * 0.9;
        ch = window.innerHeight * 0.85;

        cw = 800;
        ch = 800;
        canvas.setAttribute("width", cw);
        canvas.setAttribute("height", ch);
        document.getElementById("canvasDimensions").innerText = `canvas dimension is ${cw}x${ch}`;
        drawCanvas();
    }
    function drawCanvas() {
        context.beginPath();
        /*
        context.strokeStyle = "red";
        context.arc(0.5 * cw, 0.5 * ch, 10, 0, 2 * Math.PI);
        context.stroke();
        context.fill();
        */

        for (let i = 0; i < cw; i++) {
            for (let j = 0; j < ch; j++) {
                x = i / cw;
                y = j / ch;
                let z = squareToInterval(x, y);
                // z = makeMoreExtreme(z);
                context.strokeStyle = `rgba(${z * 256},${(1 - z) * 255},0,${z})`;
                context.beginPath();
                x = x * cw;
                y = (1 - y) * ch;
                context.moveTo(x, y);
                context.lineTo(x + 1, y + 1);
                context.stroke();
            }
        }
    }

    function makeMoreExtreme(x) {
        return ((2 * x - 1) ** 3 + 1) / 2;
    }

    function squareToInterval(x, y) {
        let result = 0;
        let step = 0.5;
        for (let i = 0; i < 64; i++) {
            result += (x >= 0.5 ? step : 0) + (y >= 0.5 ? step / 2 : 0);
            if (x >= 0.5) {
                x -= 0.5;
            }
            if (y >= 0.5) {
                y -= 0.5;
            }
            x = x * 2;
            y = y * 2;
            step = step / 4;
        }
        return result;
    }


    window.onresize = windowResize;
    windowResize();
</script>

</html>
